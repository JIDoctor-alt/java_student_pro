global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 抓取 Spring Boot 后端（Actuator + Micrometer 暴露的 Prometheus 指标）
  - job_name: 'zhenqi-backend'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      # 后端运行在宿主机 8123 端口，容器内通过 host.docker.internal 访问宿主机
      - targets: ['host.docker.internal:8123']
        labels:
          application: 'zhenqi-end'

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
