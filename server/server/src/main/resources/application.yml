server:
  port: 8123
  servlet:
    # 全局接口前缀，前端请求统一走 /api
    context-path: /api

spring:
  application:
    name: zhenqi-end
  config:
    # 本地密钥：复制 application-local.yml.example -> application-local.yml
    import: optional:classpath:application-local.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库名 student_pro，请按本地实际情况修改账号密码
    url: jdbc:mysql://localhost:3306/student_pro?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  # Redis 分布式 Session（需本地启动 Redis，默认 localhost:6379）
  session:
    store-type: redis
    timeout: 30d
  data:
    redis:
      host: localhost
      port: 6379
      # 使用独立 db，避免与默认 db0 上的其他 Redis 数据冲突
      database: 1

# LangChain4j 接入 DeepSeek（OpenAI 兼容协议）
# API Key 从环境变量 DEEPSEEK_API_KEY 读取，避免硬编码密钥到代码库
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-v4-flash
      temperature: 0.7
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-v4-flash
      temperature: 0.7
      log-requests: true
      log-responses: true

# 应用自定义配置
app:
  # 初始管理员自举：全新数据库首次启动时若无管理员则自动创建
  admin:
    init-enabled: true
    account: admin
    # 留空则启动时随机生成密码并打印到日志；也可通过环境变量 ADMIN_INIT_PASSWORD 注入
    password: ${ADMIN_INIT_PASSWORD:admin12345}
  server-base-url: http://127.0.0.1:8123/api
  cover-enabled: true
  cover-width: 1280
  cover-height: 800
  cover-wait-seconds: 3
  # AI 工作流：图片素材收集
  asset-collection-enabled: true
  pexels-api-key: ${PEXELS_API_KEY:}
  pexels-per-page: 3
  undraw-per-page: 3
  # LangGraph4j 工作流：质量检测失败重试次数（0=不重试）
  workflow-max-retries: 1
  # LangGraph4j Checkpoint 持久化到 Redis（使用独立 db，避免与 Session 冲突）
  workflow-checkpoint-enabled: true
  workflow-checkpoint-redis-database: 2
  # 分场景 AI 模型（成本优化：简单任务可走 DashScope qwen-turbo，复杂 Agent 用 DeepSeek）
  # 说明：LangChain4j 1.17 尚无 routing-chat-model 自动配置，场景路由见 AiModelRouter
  ai-model:
    base-url: https://api.deepseek.com/v1
    api-key: ${DEEPSEEK_API_KEY:}
    scenarios:
      # HTML 流式：低成本 Qwen（DashScope OpenAI 兼容模式）
      html-stream:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${DASHSCOPE_API_KEY:}
        model-name: qwen-turbo
        temperature: 0.7
        max-tokens: 8192
        log-requests: true
        log-responses: true
      multi-file-stream:
        model-name: deepseek-v4-flash
        temperature: 0.7
      code-sync:
        model-name: deepseek-v4-flash
        temperature: 0.7
      # 质量修正重试：低成本 Qwen
      code-retry:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${DASHSCOPE_API_KEY:}
        model-name: qwen-turbo
        temperature: 0.3
        max-tokens: 8192
        log-requests: true
        log-responses: true
      vue-agent:
        model-name: deepseek-v4-pro
        temperature: 0.5
      # 首页提示词优化：低成本 Qwen
      prompt-optimize:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${DASHSCOPE_API_KEY:}
        model-name: qwen-turbo
        temperature: 0.7
        max-tokens: 2048
        log-requests: true
        log-responses: true

# 腾讯云 COS 对象存储（封面截图上传，本地开发可留空以使用 /cover/** 静态目录）
cos:
  client:
    host: ${COS_HOST:}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-beijing}
    bucket: ${COS_BUCKET:}
    key-prefix: cover/

# MyBatis Flex 配置
mybatis-flex:
  global-config:
    # 关闭启动 banner
    print-banner: false
    # 逻辑删除字段：0 未删除，1 已删除
    logic-delete-column: is_delete
  configuration:
    # 列名与字段名均为驼峰，关闭下划线转驼峰
    map-underscore-to-camel-case: false
    # 开发期打印 SQL，便于调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 可观测性：Spring Boot Actuator + Micrometer(Prometheus)
# Prometheus 抓取地址：http://localhost:8123/api/actuator/prometheus
management:
  endpoints:
    web:
      exposure:
        # 暴露健康检查、指标与 Prometheus 抓取端点
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      # 统一附加应用标签，便于 Grafana 多实例区分
      application: ${spring.application.name}
    distribution:
      # 为 AI 请求耗时开启直方图分桶，支持 Grafana 计算 P95/P99
      percentiles-histogram:
        "[ai.request.duration]": true
      slo:
        "[ai.request.duration]": 1s,3s,5s,10s,30s,60s
  prometheus:
    metrics:
      export:
        enabled: true
