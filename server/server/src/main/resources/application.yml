server:
  port: 8123
  servlet:
    # 全局接口前缀，前端请求统一走 /api
    context-path: /api

spring:
  application:
    name: zhenqi-end
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库名 student_pro，请按本地实际情况修改账号密码
    url: jdbc:mysql://localhost:3306/student_pro?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  # Redis 分布式 Session（需本地启动 Redis，默认 localhost:6379）
  session:
    store-type: redis
    timeout: 30d
  data:
    redis:
      host: localhost
      port: 6379
      # 使用独立 db，避免与其他项目（如 yuaicodemother）在 db0 的 Session 冲突
      database: 1

# LangChain4j 接入 DeepSeek（OpenAI 兼容协议）
# API Key 从环境变量 DEEPSEEK_API_KEY 读取，避免硬编码密钥到代码库
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      temperature: 0.7
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      temperature: 0.7
      log-requests: true
      log-responses: true

# MyBatis Flex 配置
mybatis-flex:
  global-config:
    # 关闭启动 banner
    print-banner: false
    # 逻辑删除字段：0 未删除，1 已删除
    logic-delete-column: is_delete
  configuration:
    # 列名与字段名均为驼峰，关闭下划线转驼峰
    map-underscore-to-camel-case: false
    # 开发期打印 SQL，便于调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
