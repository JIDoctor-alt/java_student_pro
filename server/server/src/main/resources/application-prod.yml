server:
  port: 8123
  servlet:
    context-path: /api

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/student_pro?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
  session:
    store-type: redis
    timeout: 30d
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1

app:
  # 初始管理员自举：全新数据库首次启动时若无管理员则自动创建
  admin:
    init-enabled: true
    account: ${ADMIN_INIT_ACCOUNT:admin}
    # 默认密码 admin12345，生产环境建议通过环境变量 ADMIN_INIT_PASSWORD 覆盖，并登录后尽快修改
    password: ${ADMIN_INIT_PASSWORD:admin12345}
  deploy-host: http://124.70.195.81/api/static
  server-base-url: http://124.70.195.81/api
  cover-enabled: true

# 生产环境封面走 COS（请配置环境变量 COS_*）
cos:
  client:
    host: ${COS_HOST:}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:}
    key-prefix: cover/

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      temperature: 0.7
      log-requests: false
      log-responses: false
    streaming-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-chat
      temperature: 0.7
      log-requests: false
      log-responses: false

mybatis-flex:
  global-config:
    print-banner: false
    logic-delete-column: is_delete
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 可观测性：Actuator + Prometheus（生产建议将 /actuator 限制在内网或加认证）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
